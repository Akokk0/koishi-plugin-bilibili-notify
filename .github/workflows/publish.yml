name: Publish Packages

on:
  push:
    branches:
      - "monorepo"
    paths:
      - "packages/**/package.json"
  workflow_dispatch:
    inputs:
      force:
        description: "Force build & publish even if version unchanged"
        required: false
        default: "false"
      package:
        description: "Which package to force publish (core or advanced-subscription). Leave empty to run all."
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [core, advanced-subscription]
    name: Publish (${{ matrix.package }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if package should run
        id: check_run
        run: |
          FORCE="${{ github.event.inputs.force }}"
          SELECT_PACKAGE="${{ github.event.inputs.package }}"
          CURRENT_PACKAGE="${{ matrix.package }}"

          RUN="true"

          if [ -n "$SELECT_PACKAGE" ] && [ "$SELECT_PACKAGE" != "$CURRENT_PACKAGE" ]; then
            echo "Package $CURRENT_PACKAGE is not selected. Skipping."
            RUN="false"
          fi

          echo "run=$RUN" >> $GITHUB_OUTPUT
          echo "force=$FORCE" >> $GITHUB_OUTPUT

      - name: Check version change
        id: check_version
        if: steps.check_run.outputs.run == 'true'
        run: |
          set -e
          PKG="packages/${{ matrix.package }}/package.json"

          CURRENT_VERSION=$(jq -r '.version' "$PKG")
          echo "Current version: $CURRENT_VERSION"

          PREVIOUS_VERSION=$(git show HEAD^:"$PKG" 2>/dev/null | jq -r '.version' || echo "")
          echo "Previous version: $PREVIOUS_VERSION"

          PUBLISH="false"

          if [ "${{ steps.check_run.outputs.force }}" = "true" ]; then
            echo "Force build enabled, publishing."
            PUBLISH="true"
          if [ -z "$PREVIOUS_VERSION" ]; then
            echo "First release of this package (no previous version)."
            PUBLISH="true"
          elif [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version bump detected: $PREVIOUS_VERSION → $CURRENT_VERSION"
            PUBLISH="true"
          else
            echo "No new version bump in this push."
          fi

          echo "publish=$PUBLISH" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node
        if: steps.check_version.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
        env:
          DISABLE_V8_COMPILE_CACHE: 1

      - name: Enable Corepack
        if: steps.check_version.outputs.publish == 'true'
        run: corepack enable

      - name: Install dependencies
        if: steps.check_version.outputs.publish == 'true'
        run: yarn install --no-immutable

      - name: Build
        if: steps.check_version.outputs.publish == 'true'
        working-directory: packages/${{ matrix.package }}
        run: yarn build

      - name: Build client for core
        if: steps.check_version.outputs.publish == 'true' && matrix.package == 'core'
        working-directory: packages/${{ matrix.package }}
        run: yarn client

      - name: Publish
        if: steps.check_version.outputs.publish == 'true'
        working-directory: packages/${{ matrix.package }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
